<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 작성</title>

    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/make-post.css" />
  </head>

  <body class="make-post-page">
    <div class="page">
      <header class="header make-post-header">
        <a class="header-back-link" href="./posts.html" aria-label="게시글 목록으로 돌아가기">
          <img src="../assets/images/back-button.png" alt="" aria-hidden="true" />
        </a>
        <h1 class="make-post-logo">
          <a class="header-logo-link" href="./posts.html" aria-label="게시글 목록으로 이동">
            <span aria-hidden="true">&lt;/&gt;</span>
            코드 한입
          </a>
        </h1>

        <div class="profile-menu-container" id="profile-menu-container">
          <button
            type="button"
            class="profile-button"
            id="profile-button"
            aria-label="회원 메뉴 열기"
            aria-expanded="false"
            aria-controls="profile-menu"
          >
            <img class="profile-image" id="profile-image" alt="내 프로필 사진" />
          </button>

          <nav class="profile-menu" id="profile-menu" aria-label="회원 메뉴" hidden>
            <a class="profile-menu-item" href="./edit-profile.html">회원정보 수정</a>
            <a class="profile-menu-item" href="./edit-password.html">비밀번호 수정</a>
            <button
              type="button"
              class="profile-menu-item profile-logout-button"
              id="logout-button"
            >
              로그아웃
            </button>
          </nav>
        </div>
      </header>

      <main class="main make-post-main">
        <section class="make-post-container" aria-labelledby="make-post-title">
          <div class="make-post-heading">
            <h2 class="make-post-title" id="make-post-title">게시글 작성</h2>
          </div>

          <form class="make-post-editor" id="make-post-form">
            <div class="make-post-title-field">
              <label class="sr-only" for="post-title">제목*</label>
              <input
                type="text"
                id="post-title"
                name="title"
                maxlength="26"
                placeholder="오늘의 개발 한입을 적어주세요"
              />
              <p class="make-post-helper" id="title-helper"></p>
            </div>

            <div class="make-post-content-field">
              <label class="sr-only" for="post-content">내용*</label>
              <textarea
                id="post-content"
                name="content"
                placeholder="배운 점, 막혔던 부분, 해결한 과정을 자유롭게 남겨보세요."
              ></textarea>
              <p class="make-post-helper" id="content-helper"></p>
            </div>

            <div class="post-image-upload-area">
              <label class="post-image-label" for="post-images">이미지</label>
              <input
                type="file"
                id="post-images"
                name="postImages"
                accept="image/*"
                multiple
              />
              <p class="selected-image-names" id="selected-image-names">선택된 이미지가 없습니다.</p>
              <div class="post-image-preview-list" id="post-image-preview-list"></div>
            </div>

            <div class="make-post-actions">
              <button
                type="submit"
                class="make-post-submit-button"
                id="make-post-submit-button"
                disabled
              >
                완료
              </button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="../js/make-post.js"></script>
  </body>
</html>
