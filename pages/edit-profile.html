<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원정보 수정</title>

    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/edit-profile.css" />
  </head>

  <body class="edit-profile-page">
    <div class="page">
      <header class="header edit-profile-header">
        <h1 class="edit-profile-logo">
          <a class="header-logo-link" href="./posts.html" aria-label="게시글 목록으로 이동">
            <span aria-hidden="true">&lt;/&gt;</span>
            코드 한입
          </a>
        </h1>

        <div class="profile-menu-container" id="profile-menu-container">
          <button
            type="button"
            class="profile-button"
            id="profile-button"
            aria-label="회원 메뉴 열기"
            aria-expanded="false"
            aria-controls="profile-menu"
          >
            <img class="profile-image" id="profile-image" alt="내 프로필 사진" />
          </button>

          <nav class="profile-menu" id="profile-menu" aria-label="회원 메뉴" hidden>
            <a class="profile-menu-item" href="./edit-profile.html">회원정보 수정</a>
            <a class="profile-menu-item" href="./edit-password.html">비밀번호 수정</a>
            <button
              type="button"
              class="profile-menu-item profile-logout-button"
              id="logout-button"
            >
              로그아웃
            </button>
          </nav>
        </div>
      </header>

      <main class="main edit-profile-main">
        <section class="edit-profile-container" aria-labelledby="edit-profile-title">
          <h2 class="edit-profile-title" id="edit-profile-title">회원정보 수정</h2>
          <p class="edit-profile-description">프로필과 닉네임을 관리해보세요.</p>

          <form class="edit-profile-form" id="edit-profile-form" hidden>
            <div class="edit-profile-card">
              <div class="profile-edit-area">
                <span class="profile-edit-label">프로필 사진</span>
                <label class="profile-edit-image-box" for="new-profile-image">
                  <img id="profile-edit-preview" alt="프로필 사진 미리보기" />
                  <span class="profile-edit-overlay">이미지 변경</span>
                </label>
                <input
                  type="file"
                  id="new-profile-image"
                  name="profileImage"
                  accept="image/*"
                  hidden
                />
              </div>

              <div class="edit-profile-field">
                <span class="edit-profile-field-label">이메일</span>
                <p class="edit-profile-email" id="user-email"></p>
                <p class="edit-profile-note">이메일은 변경할 수 없습니다.</p>
              </div>

              <div class="edit-profile-field">
                <label class="edit-profile-field-label" for="nickname">닉네임</label>
                <input type="text" id="nickname" name="nickname" maxlength="10" />
                <p class="edit-profile-helper" id="nickname-helper"></p>
                <p class="edit-profile-note">닉네임은 띄어쓰기 없이 10자 이내로 설정해주세요.</p>
              </div>

              <button
                type="submit"
                class="edit-profile-submit-button"
                id="edit-profile-submit-button"
                disabled
              >
                변경사항 저장
              </button>
            </div>

            <div class="withdrawal-panel">
              <strong>코드 한입을 떠나시나요?</strong>
              <p>회원 탈퇴 시 모든 데이터가 삭제됩니다.</p>
              <button type="button" class="withdrawal-button" id="withdrawal-button">
                회원 탈퇴
              </button>
            </div>
          </form>

          <p class="edit-profile-toast" id="edit-profile-toast" role="status" hidden>수정완료</p>
        </section>
      </main>
    </div>

    <div class="withdrawal-modal-backdrop" id="withdrawal-modal" hidden>
      <section
        class="withdrawal-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="withdrawal-modal-title"
      >
        <h2 id="withdrawal-modal-title">회원탈퇴 하시겠습니까?</h2>
        <p>작성된 게시글과 댓글은 삭제됩니다.</p>
        <div class="withdrawal-modal-actions">
          <button type="button" class="withdrawal-modal-button withdrawal-cancel-button" id="withdrawal-cancel-button">
            취소
          </button>
          <button type="button" class="withdrawal-modal-button withdrawal-confirm-button" id="withdrawal-confirm-button">
            확인
          </button>
        </div>
      </section>
    </div>

    <script type="module" src="../js/edit-profile.js"></script>
  </body>
</html>
