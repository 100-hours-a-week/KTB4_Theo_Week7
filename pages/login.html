<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body class="auth-page">
  <main class="auth-main login-main">
    <section class="auth-shell" aria-labelledby="login-title">
      <div class="auth-brand">
        <p class="auth-logo" aria-label="코드 한입">
          <span aria-hidden="true">&lt;/&gt;</span>
          코드 한입
        </p>
        <p class="auth-tagline">개발자의 성장 한입, 지식의 공유 한입</p>
      </div>

      <section class="auth-card form-container">
        <h1 class="auth-title" id="login-title">로그인</h1>
        <p class="auth-description">
          이메일로 로그인하고 오늘의 개발 이야기를 이어가세요.
        </p>

        <form id="login-form">
          <div class="form-group">
            <label for="email">이메일</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="이메일을 입력하세요"
              autocomplete="email"
            />
            <p class="helper-text" id="email-helper"></p>
          </div>

          <div class="form-group">
            <label for="password">비밀번호</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
            />
            <p class="helper-text" id="password-helper"></p>
          </div>

          <button type="submit" class="primary-button" id="login-button" disabled>
            로그인
          </button>
        </form>

        <div class="auth-switch">
          아직 회원이 아니신가요?
          <a href="./signup.html" class="text-link">회원가입</a>
        </div>
      </section>
    </section>
  </main>
  <script type="module" src="../js/login.js"></script>
</body>
</html>
