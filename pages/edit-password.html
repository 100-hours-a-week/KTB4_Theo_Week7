<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 수정</title>

    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/edit-password.css" />
  </head>

  <body class="edit-password-page">
    <div class="page">
      <header class="header edit-password-header">
        <h1 class="edit-password-logo">
          <a class="header-logo-link" href="./posts.html" aria-label="게시글 목록으로 이동">
            <span aria-hidden="true">&lt;/&gt;</span>
            코드 한입
          </a>
        </h1>

        <div class="profile-menu-container" id="profile-menu-container">
          <button
            type="button"
            class="profile-button"
            id="profile-button"
            aria-label="회원 메뉴 열기"
            aria-expanded="false"
            aria-controls="profile-menu"
          >
            <img class="profile-image" id="profile-image" alt="내 프로필 사진" />
          </button>

          <nav class="profile-menu" id="profile-menu" aria-label="회원 메뉴" hidden>
            <a class="profile-menu-item" href="./edit-profile.html">회원정보 수정</a>
            <a class="profile-menu-item" href="./edit-password.html">비밀번호 수정</a>
            <button
              type="button"
              class="profile-menu-item profile-logout-button"
              id="logout-button"
            >
              로그아웃
            </button>
          </nav>
        </div>
      </header>

      <main class="main edit-password-main">
        <section class="edit-password-container" aria-labelledby="edit-password-title">
          <h2 class="edit-password-title" id="edit-password-title">비밀번호 수정</h2>
          <p class="edit-password-description">
            안전한 비밀번호로 계정을 보호해주세요.
          </p>

          <form class="edit-password-card" id="edit-password-form">
            <div class="edit-password-form-group">
              <label for="password">비밀번호</label>
              <p class="edit-password-guide">
                8~20자, 대문자·소문자·숫자·특수문자를 각각 1개 이상 포함해주세요.
              </p>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="비밀번호를 입력하세요"
                autocomplete="new-password"
              />
              <p class="edit-password-helper" id="password-helper"></p>
            </div>

            <div class="edit-password-form-group">
              <label for="password-confirm">비밀번호 확인</label>
              <p class="edit-password-guide">
                위에 입력한 비밀번호와 동일하게 입력해주세요.
              </p>
              <input
                type="password"
                id="password-confirm"
                name="passwordConfirm"
                placeholder="비밀번호를 한번 더 입력하세요"
                autocomplete="new-password"
              />
              <p class="edit-password-helper" id="password-confirm-helper"></p>
            </div>

            <button
              type="submit"
              class="edit-password-submit-button"
              id="edit-password-submit-button"
              disabled
            >
              수정하기
            </button>
          </form>
        </section>
      </main>
    </div>

    <p class="edit-password-toast" id="edit-password-toast" role="status" hidden>수정완료</p>

    <script type="module" src="../js/edit-password.js"></script>
  </body>
</html>
