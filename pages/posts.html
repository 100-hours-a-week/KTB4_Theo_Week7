<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 목록</title>

    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/posts.css" />
  </head>

  <body class="posts-page">
    <div class="page">
      <header class="header posts-header">
        <h1 class="posts-logo">
          <a class="header-logo-link" href="./posts.html" aria-label="게시글 목록으로 이동">
            <span aria-hidden="true">&lt;/&gt;</span>
            코드 한입
          </a>
        </h1>

        <div class="profile-menu-container" id="profile-menu-container">
          <button
            type="button"
            class="profile-button"
            id="profile-button"
            aria-label="회원 메뉴 열기"
            aria-expanded="false"
            aria-controls="profile-menu"
          >
            <img
              class="profile-image"
              id="profile-image"
              alt="내 프로필 사진"
            />
          </button>

          <nav class="profile-menu" id="profile-menu" aria-label="회원 메뉴" hidden>
            <a class="profile-menu-item" href="./edit-profile.html">회원정보 수정</a>
            <a class="profile-menu-item" href="./edit-password.html">비밀번호 수정</a>
            <button
              type="button"
              class="profile-menu-item profile-logout-button"
              id="logout-button"
            >
              로그아웃
            </button>
          </nav>
        </div>
      </header>

      <main class="main posts-main">
        <section class="posts-container" aria-labelledby="posts-greeting">
          <h2 class="posts-greeting" id="posts-greeting">
            전체 피드
            <span>개발자들의 지식과 경험을 한입에</span>
          </h2>

          <div class="write-button-area">
            <a class="write-button" href="./make-post.html">게시글 작성</a>
          </div>

          <!-- 조회된 게시글 카드는 추후 JavaScript에서 이 목록에 추가합니다. -->
          <div class="post-list" id="post-list" aria-live="polite"></div>
          <div
            class="post-list-sentinel"
            id="post-list-sentinel"
            aria-hidden="true"
          ></div>
        </section>
      </main>
    </div>
    <script type="module" src="../js/posts.js"></script>
  </body>
</html>
