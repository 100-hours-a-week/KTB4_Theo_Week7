<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>

    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/signup.css" />
  </head>

  <body>
    <div class="page">
      <header class="header signup-header">
        <button type="button" class="back-button" id="back-button">
          <a href="./login.html" class="back-link">&lt;</a>
        </button>

        <h1>아무 말 대잔치</h1>
      </header>

      <main class="main signup-main">
        <section class="form-container signup-container">
          <h2 class="page-title signup-title">회원가입</h2>

          <form id="signup-form">
            <div class="profile-upload-area">
              <label class="profile-label">프로필 사진*</label>
              <p class="helper-text profile-helper" id="profile-helper"></p>

              <label for="profile-image" class="profile-image-box" id="profile-image-box">
                <span class="profile-plus" id="profile-plus">+</span>
                <img id="profile-preview" class="profile-preview" alt="프로필 미리보기" />
              </label>

              <input
                type="file"
                id="profile-image"
                name="profileImage"
                accept="image/*"
                hidden
              />
            </div>

            <div class="form-group">
              <label for="email">이메일*</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="이메일을 입력하세요"
                autocomplete="email"
              />
              <p class="helper-text" id="email-helper"></p>
            </div>

            <div class="form-group">
              <label for="password">비밀번호*</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="비밀번호를 입력하세요"
                autocomplete="new-password"
              />
              <p class="helper-text" id="password-helper"></p>
            </div>

            <div class="form-group">
              <label for="password-confirm">비밀번호 확인*</label>
              <input
                type="password"
                id="password-confirm"
                name="passwordConfirm"
                placeholder="비밀번호를 한번 더 입력하세요"
                autocomplete="new-password"
              />
              <p class="helper-text" id="password-confirm-helper"></p>
            </div>

            <div class="form-group">
              <label for="nickname">닉네임*</label>
              <input
                type="text"
                id="nickname"
                name="nickname"
                placeholder="닉네임을 입력하세요"
              />
              <p class="helper-text" id="nickname-helper"></p>
            </div>

            <button
              type="submit"
              class="primary-button signup-button"
              id="signup-button"
              disabled
            >
              회원가입
            </button>
          </form>

          <a href="./login.html" class="text-link login-link">
            로그인하러 가기
          </a>
        </section>
      </main>
    </div>
    <script src="../js/common.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/signup.js"></script>
  </body>
</html>
