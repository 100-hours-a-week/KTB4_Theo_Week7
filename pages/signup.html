<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>

    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/signup.css" />
  </head>

  <body class="auth-page">
    <main class="auth-main signup-main">
      <section class="auth-shell signup-shell" aria-labelledby="signup-title">
        <div class="auth-brand">
          <p class="auth-logo" aria-label="코드 한입">
            <span aria-hidden="true">&lt;/&gt;</span>
            코드 한입
          </p>
          <p class="auth-tagline">개발자의 성장 한입, 지식의 공유 한입</p>
        </div>

        <section class="auth-card form-container signup-container">
          <a href="./login.html" class="auth-back-link" aria-label="로그인으로 돌아가기">
            <img
              src="../assets/images/back-button.png"
              alt=""
              aria-hidden="true"
            />
          </a>

          <h1 class="auth-title signup-title" id="signup-title">회원가입</h1>
          <p class="auth-description">
            코드 한입에서 지식을 나누고 성장 기록을 쌓아보세요.
          </p>

          <form id="signup-form">
            <div class="profile-upload-area">
              <label class="profile-label">프로필 사진*</label>
              <p class="helper-text profile-helper" id="profile-helper"></p>

              <label for="profile-image" class="profile-image-box" id="profile-image-box">
                <img
                  src="../assets/images/basic-profile-icon.png"
                  class="profile-plus"
                  id="profile-plus"
                  alt=""
                  aria-hidden="true"
                />
                <img id="profile-preview" class="profile-preview" alt="프로필 미리보기" />
              </label>

              <input
                type="file"
                id="profile-image"
                name="profileImage"
                accept="image/*"
                hidden
              />
            </div>

            <div class="form-group">
              <label for="email">이메일*</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="이메일을 입력하세요"
                autocomplete="email"
              />
              <p class="helper-text" id="email-helper"></p>
            </div>

            <div class="form-group">
              <label for="password">비밀번호*</label>
              <p class="signup-field-guide">
                8~20자, 대문자·소문자·숫자·특수문자를 각각 1개 이상 포함해주세요.
              </p>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="비밀번호를 입력하세요"
                autocomplete="new-password"
              />
              <p class="helper-text" id="password-helper"></p>
            </div>

            <div class="form-group">
              <label for="password-confirm">비밀번호 확인*</label>
              <input
                type="password"
                id="password-confirm"
                name="passwordConfirm"
                placeholder="비밀번호를 한번 더 입력하세요"
                autocomplete="new-password"
              />
              <p class="helper-text" id="password-confirm-helper"></p>
            </div>

            <div class="form-group">
              <label for="nickname">닉네임*</label>
              <p class="signup-field-guide">
                띄어쓰기 없이 10자 이내로 작성해주세요.
              </p>
              <input
                type="text"
                id="nickname"
                name="nickname"
                placeholder="닉네임을 입력하세요"
              />
              <p class="helper-text" id="nickname-helper"></p>
            </div>

            <button
              type="submit"
              class="primary-button signup-button"
              id="signup-button"
              disabled
            >
              회원가입
            </button>
          </form>

          <div class="auth-switch">
            이미 계정이 있으신가요?
            <a href="./login.html" class="text-link login-link">
              로그인
            </a>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="../js/signup.js"></script>
  </body>
</html>
